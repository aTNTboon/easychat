<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }
        #captchaImg {
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>认证测试页面</h1>

    <div class="form-group">
        <label for="email">邮箱:</label>
        <input type="email" id="email" required>
    </div>

    <div class="form-group">
        <label for="password">密码:</label>
        <input type="password" id="password" required>
    </div>

    <div class="form-group">
        <label for="captcha">验证码:</label>
        <input type="text" id="captcha" required>
        <img id="captchaImg" src="http://localhost:8080/captcha" alt="点击刷新验证码" title="点击刷新验证码">
    </div>

    <div class="form-group">
        <button id="loginBtn">登录</button>
        <button id="registerBtn">注册</button>
    </div>

    <div id="result"></div>

    <script>
        // 刷新验证码
        document.getElementById('captchaImg').addEventListener('click', function() {
            this.src = 'http://localhost:8080/api/account/captcha?captchaId=' + new Date().getTime();
        });

        // 获取验证码ID
        let captchaId = '';
        document.getElementById('captchaImg').addEventListener('load', function() {
            const url = new URL(this.src);
            captchaId = url.searchParams.get('captchaId') || '';
        });

        // 登录请求
        document.getElementById('loginBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;

            try {
                const response = await fetch('http://localhost:8080/api/account/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        captchaCode: captcha,
                        captchaId
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    document.getElementById('result').innerHTML = `登录成功! Token: ${result.token}`;
                } else {
                    document.getElementById('result').innerHTML = `错误: ${result.message || '未知错误'}`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `请求失败: ${error.message}`;
            }
        });

        // 注册请求
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;

            try {
                const response = await fetch('http://localhost:8080/api/account/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        nickName: '测试用户',
                        captchaCode: captcha,
                        captchaId
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    document.getElementById('result').innerHTML = `注册成功! Token: ${result.token}`;
                } else {
                    document.getElementById('result').innerHTML = `错误: ${result.message || '未知错误'}`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `请求失败: ${error.message}`;
            }
        });
    </script>
</body>
</html>
